global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: ecom-analytics

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # 拉取 5 个微服务的 actuator/prometheus 端点
  # host.docker.internal 在 docker-compose 中指 host, 用于跨容器抓取宿主上的服务
  - job_name: ecom-services
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets:
          - host.docker.internal:8080
          - host.docker.internal:8081
          - host.docker.internal:8082
          - host.docker.internal:8083
          - host.docker.internal:8084
        labels:
          env: dev

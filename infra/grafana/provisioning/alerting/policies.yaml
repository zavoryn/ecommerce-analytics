apiVersion: 1

# 告警路由策略 - 所有告警走飞书; 不同 severity 路由不同 contact point 可在此分流。
policies:
  - orgId: 1
    receiver: lark-default
    group_by: ['alertname', 'service']
    group_wait: 30s          # 同组告警等 30s 合并发一条
    group_interval: 5m       # 同组下次发送至少间隔 5min
    repeat_interval: 4h      # 未 resolve 的告警最多 4h 提醒一次, 避免轰炸
    routes:
      # P0 告警(severity=critical) 缩短重复发送间隔到 30min
      - receiver: lark-default
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 30m

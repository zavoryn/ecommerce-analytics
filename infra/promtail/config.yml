server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ecom-analytics-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: ecom-analytics
          # 注意: 容器内 /var/log/ecom-analytics 挂载到宿主对应目录
          __path__: /var/log/ecom-analytics/**/*.log
    pipeline_stages:
      # 解析 JSON 日志(由 logstash-logback-encoder 输出, 见 common/logback-spring.xml)
      - json:
          expressions:
            ts: ts
            level: level
            service: service
            logger: logger
            msg: msg
            traceId: traceId
      - labels:
          level:
          service:
      - timestamp:
          source: ts
          format: RFC3339
